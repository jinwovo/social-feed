<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>social-feed — 하이브리드 fan-out 타임라인</title>
<style>
  :root{--bg:#0b0e14;--panel:#141925;--panel2:#1b2230;--line:#263042;--txt:#e6edf3;--mut:#8b97a8;--acc:#5eb1ff;--ok:#3fb950;--chip:#222b3a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,Roboto,sans-serif}
  .wrap{max-width:680px;margin:0 auto;padding:40px 22px 80px}
  h1{font-size:26px;margin:0 0 4px}
  .sub{color:var(--mut);font-size:14px;margin:0 0 22px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  label{font-size:12px;color:var(--mut)}
  select,input,textarea{width:100%;background:#0b0f17;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;margin-top:4px}
  textarea{resize:vertical;min-height:54px}
  .rowflex{display:flex;gap:10px;align-items:flex-end}
  .rowflex > div{flex:1}
  button{cursor:pointer;border-radius:8px;border:1px solid var(--line);font-weight:600}
  .post{background:var(--acc);color:#06121f;border-color:var(--acc);padding:9px 18px;font-size:14px;white-space:nowrap}
  .ghost{background:#21262d;color:var(--txt);padding:9px 14px;font-size:13px}
  .who{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 0}
  .who span{font-size:12px;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .tl-head{display:flex;justify-content:space-between;align-items:center;margin:6px 0 8px}
  .tl-head b{font-size:15px}
  .feeditem{border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:8px;background:var(--panel)}
  .feeditem .a{color:var(--acc);font-weight:700;font-size:13px}
  .feeditem .t{color:var(--mut);font-size:11.5px;float:right}
  .feeditem .c{margin-top:3px}
  .empty{color:var(--mut);font-size:13px}
  a{color:var(--mut);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>social-feed</h1>
  <p class="sub">읽기 확장형 피드. 글을 쓰면 작성자의 팔로워 타임라인으로 <b>fan-out</b>(push)되고, 셀럽은 <b>pull</b>로 읽어 합치는 하이브리드. 아래에서 <b>me</b>는 alice·bob·celeb을 팔로우합니다 — 그들이 글을 쓰면 <b>내 타임라인</b>에 나타납니다.</p>

  <div class="card" id="status">세션 사용자 생성 중…</div>

  <div class="card">
    <div class="rowflex">
      <div>
        <label>작성자</label>
        <select id="author"></select>
      </div>
      <button class="post" onclick="post()">게시</button>
    </div>
    <div style="margin-top:10px">
      <label>내용</label>
      <textarea id="content" placeholder="무슨 일이 일어나고 있나요?"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="tl-head">
      <b>📰 내(me) 타임라인</b>
      <button class="ghost" onclick="loadTimeline()">새로고침</button>
    </div>
    <div id="timeline"><div class="empty">아직 글이 없습니다 — 위에서 alice나 celeb으로 글을 써보세요.</div></div>
  </div>

  <p style="margin-top:8px"><a href="https://github.com/jinwovo" target="_blank">↗ GitHub</a></p>
</div>

<script>
const SUF = Math.random().toString(36).slice(2, 7); // 세션 고유 접미사 → 방문자 간 핸들 충돌 방지
const HANDLES = ['me', 'alice', 'bob', 'celeb'];
const users = {}; // handle -> id

async function api(path, opts){ const r = await fetch(path, opts); if(!r.ok) throw new Error(path+' → '+r.status); return r.status===204?null:r.json(); }

async function setup(){
  try {
    for(const h of HANDLES){
      const u = await api('/users', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({handle:h+'-'+SUF})});
      users[h] = u.id;
    }
    // me follows the others (so their posts fan out into me's timeline)
    for(const h of ['alice','bob','celeb']){
      await api(`/users/${users['me']}/follow/${users[h]}`, {method:'POST'});
    }
    document.getElementById('author').innerHTML = HANDLES.map(h=>`<option value="${h}">${h}${h==='celeb'?' (셀럽)':''}</option>`).join('');
    document.getElementById('status').innerHTML =
      `<div style="font-weight:600;margin-bottom:4px">세션 준비 완료 — <span style="color:var(--ok)">me</span> 가 팔로우 중:</div>`+
      `<div class="who">${['alice','bob','celeb'].map(h=>`<span>${h}-${SUF}</span>`).join('')}</div>`;
    await loadTimeline();
  } catch(e){
    document.getElementById('status').innerHTML = '<span style="color:#f85149">초기화 실패: '+e.message+'</span>';
  }
}

async function post(){
  const h = document.getElementById('author').value;
  const content = document.getElementById('content').value.trim();
  if(!content) return;
  try {
    await api('/posts', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({authorId:users[h], content})});
    document.getElementById('content').value='';
    setTimeout(loadTimeline, 250); // give async fan-out a beat
  } catch(e){ alert('게시 실패: '+e.message); }
}

async function loadTimeline(){
  try {
    const posts = await api(`/users/${users['me']}/timeline`);
    const idToHandle = Object.fromEntries(Object.entries(users).map(([h,id])=>[id,h]));
    const el = document.getElementById('timeline');
    if(!posts || !posts.length){ el.innerHTML = '<div class="empty">아직 글이 없습니다 — 위에서 alice나 celeb으로 글을 써보세요.</div>'; return; }
    el.innerHTML = posts.map(p=>{
      const who = idToHandle[p.authorId] || '?';
      const t = new Date(p.createdAt).toLocaleTimeString();
      return `<div class="feeditem"><span class="t">${t}</span><span class="a">@${who}-${SUF}</span><div class="c">${escapeHtml(p.content)}</div></div>`;
    }).join('');
  } catch(e){ /* ignore transient */ }
}
function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

setup();
</script>
</body>
</html>
